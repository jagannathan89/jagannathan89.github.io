        <!-- Bootstrap icons-->

    <body class="d-flex flex-column h-100">

        <main class="flex-shrink-0">
            <!-- Navigation-->
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
                <div class="container px-5">
                    <a class="navbar-brand" href="index.html">
                        <img src="assets/favicon2.png" alt="Logo" style="height: 30px;" class="d-inline-block align-text-top">
                        <span class="fw-bolder text-primary">Jagannathan</span>
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>
                            <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                            <li class="nav-item"><a class="nav-link" href="blog.html">Blogs</a></li>
                            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <section>
                <div class="container my-6">
                    <div class="row mb-3 d-flex align-items-stretch">
                        <div class="col">
                            <input type="text" id="searchInput" onkeyup="searchBlog()" placeholder="Search for blog titles..." class="form-control">
                        </div>
                    </div>
                    <div class="row d-flex align-items-stretch" id="blogContainer">
                        <!-- Blog tiles will be inserted here dynamically -->
                    </div>
                </div>
            </section>
            
        </main>

        <script>
            const blogs = [
                { title: "Salesforce Files Security", image: "assets/blogs/blog-3.png", link: "https://developer.salesforce.com/blogs/2023/06/using-fileevents-to-strengthen-file-security" },
                { title: "Salesforce Developer Podcast around Salesforce Security", image: "assets/blogs/blog-5.png", link: "https://developer.salesforce.com/podcast/2023/07/episode-187-file-and-event-security-with-jagannathan-padmanabhan"},
                { title: "A Peek at Summer 23 Release Notes", image: "assets/blogs/blog-6.png", link: "https://jagannathan-salesforce.medium.com/a-peek-at-summer-23-release-notes-bc59ad91f3d6"},
                { title: "Winter 23 Release Notes — Glimpse", image: "assets/blogs/blog-7.png", link: "https://jagannathan-salesforce.medium.com/winter-23-release-notes-glimpse-8cc8b919ad05"},
                { title: "Extended Record -Clicks Not Code [Salesforce Summer ’20 Release]", image: "assets/blogs/blog-8.png", link: "https://medium.com/slalom-technology/extended-record-summer-20-release-clicks-not-code-61c5fa170244"},
                { title: "Salesforce Evergreen --> Magical sword for salesforce developers.", image: "assets/blogs/blog-9.gif", link: "nvolutions-3cf142f77bc0"},
            ];
        
            function createBlogTiles(blogs) {
                if (blogs.length) {
                    const container = document.getElementById('blogContainer');
                    container.innerHTML = ''; // Clear the container
                    blogs.forEach(blog => {
                        const colDiv = document.createElement('div');
                        colDiv.classList.add('col-md-4', 'mb-3');
                        colDiv.innerHTML = `
                            <div class="card" onclick="location.href='${blog.link}'">
                                <img src="${blog.image}" class="img-fluid rounded mx-auto d-block" alt="${blog.title}">
                                <div class="card-body">
                                    <h5 class="card-title">${blog.title}</h5>
                                </div>
                            </div>
                        `;
                        container.appendChild(colDiv);
                    });
                }
                else {
                    const container = document.getElementById('blogContainer');
                    container.innerHTML = 'Looks like the search did not match any title.';
                }
            }
        
            function searchBlog() {
                const input = document.getElementById('searchInput');
                const filter = input.value.toUpperCase();
                const filteredBlogs = blogs.filter(blog => blog.title.toUpperCase().includes(filter));
                createBlogTiles(filteredBlogs);
            }
        
            // Initialize the blog tiles on page load
            createBlogTiles(blogs);
        </script>

        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
    </body>
</html>
